<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pokemon Collector</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b81">

<style>
body{
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    text-align: center;
    -webkit-font-smoothing: antialiased; 
    margin:0;
    padding:0;
}

/* Top sticky nav */
#top-nav{
    position: sticky;
    top:0;
    background:#ff6b81;
    padding:8px;
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    z-index:1000;
}
#top-nav button{
    flex:1 1 45%;
    margin:2px;
    padding:10px;
    font-size:14px;
    border:none;
    border-radius:6px;
    color:white;
}
@media (min-width:600px){
    #top-nav button{
        flex:1 1 20%;
    }
}

/* Grid and cards */
.grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    justify-content: center;
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto;
    box-sizing: border-box; 
}
.card{
    background: white;
    padding: 12px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 140px;
    box-sizing: border-box; 
}
.card img{
    width: 100%;
    max-width: 180px;
    height: auto;
    margin: 8px 0;
    display: block;
}

button{
    margin: 6px 4px;
    cursor: pointer;
    min-height:44px;
    min-width:44px;
}
.love{background:#d32f2f;} 
.interest{background:#feca57;color:#000;} 
.export{background:#576574;} 
.tcg{background:#54a0ff;} 
.merch{background:#10ac84;} 
  
input,select{
    padding:7px;
    margin:5px; 
  }

@media (max-width: 480px){
    .grid{ grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap:14px; padding:16px; }
    .card{ padding:14px; min-width:160px; }
    .card img{ max-width:200px; }
    button{ padding:12px 14px; font-size:15px; min-height:48px; }
}
</style>
</head>

<body>

<h1>My Pokémon Collector</h1>

<!-- Top Nav -->
<div id="top-nav">
  <button id="btn-loved">❤️ Loved</button>
  <button id="btn-interested">⭐ Interested</button>
  <button id="btn-tcg">🎴 TCG</button>
  <button id="btn-merch">🛍 Merch</button>
</div>

<!-- Export and Search -->
<button class="export" onclick="exportAll()">Export My List</button>
<br>
<input id="search" placeholder="Search Pokémon" onkeyup="searchPokemon()">

<!-- Pokémon Lists -->
<h2>All Pokémon</h2>
<div id="pokemonList" class="grid"></div>

<h2>❤️ Loved</h2>
<div id="lovedList" class="grid"></div>

<h2>⭐ Interested</h2>
<div id="interestedList" class="grid"></div>

<script>
let loved = JSON.parse(localStorage.getItem("loved")) || []
let interested = JSON.parse(localStorage.getItem("interested")) || []

function save(){
    localStorage.setItem("loved",JSON.stringify(loved))
    localStorage.setItem("interested",JSON.stringify(interested))
}

async function loadPokemon(){
    const res = await fetch("https://pokeapi.co/api/v2/pokemon?limit=1025")
    const data = await res.json()
    const container = document.getElementById("pokemonList")
    data.results.forEach((p,i)=>{
        const id = i+1
        const img=`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`
        const card=document.createElement("div")
        card.className="card"
        card.setAttribute("data-name",p.name)
        card.innerHTML=`
            <b>${p.name}</b><br>
            <img loading="lazy" src="${img}"><br>
            <button class="love" onclick="love('${p.name}','${img}')">❤️</button>
            <button class="interest" onclick="interest('${p.name}','${img}')">⭐</button><br>
            <button class="tcg" onclick="openTCG('${p.name}')">TCG</button>
            <button class="merch" onclick="openMerch('${p.name}')">Merch</button>
        `
        container.appendChild(card)
    })
}

function love(name,img){
    if(!loved.find(p=>p.name==name)){
        loved.push({name,img})
        save()
        render()
    }
}
function interest(name,img){
    if(!interested.find(p=>p.name==name)){
        interested.push({name,img})
        save()
        render()
    }
}

function render(){
    const l=document.getElementById("lovedList")
    const i=document.getElementById("interestedList")
    l.innerHTML=""
    i.innerHTML=""
    loved.forEach(p=>{
        l.innerHTML+=`<div class="card"><b>${p.name}</b><br><img src="${p.img}"></div>`
    })
    interested.forEach(p=>{
        i.innerHTML+=`<div class="card"><b>${p.name}</b><br><img src="${p.img}"></div>`
    })
}

function searchPokemon(){
    const term=document.getElementById("search").value.toLowerCase()
    const cards=document.querySelectorAll("#pokemonList .card")
    cards.forEach(c=>{
        const name=c.getAttribute("data-name")
        c.style.display=name.includes(term)?"block":"none"
    })
}

function openTCG(name){
    window.open(`https://www.pokemon.com/us/pokemon-tcg/pokemon-cards/?cardName=${name}`)
}

function openMerch(name){
    window.open(`https://www.pokemoncenter.com/search/${name}`)
}

function exportAll(){
    let text="My Pokémon Collector\n\n"
    text+="❤️ Loved\n"
    loved.forEach(p=>{text+="- "+p.name+"\n"})
    text+="\n⭐ Interested\n"
    interested.forEach(p=>{text+="- "+p.name+"\n"})
    const element=document.createElement("a")
    element.href="data:text/plain;charset=utf-8,"+encodeURIComponent(text)
    element.download="pokemon_list.txt"
    element.click()
}

loadPokemon()
render()

// Top nav button functionality
document.getElementById("btn-loved").addEventListener("click", () => {
    window.scrollTo({top: document.getElementById("lovedList").offsetTop - 70, behavior:"smooth"});
});
document.getElementById("btn-interested").addEventListener("click", () => {
    window.scrollTo({top: document.getElementById("interestedList").offsetTop - 70, behavior:"smooth"});
});
document.getElementById("btn-tcg").addEventListener("click", () => {
    window.open("https://www.pokemon.com/us/pokemon-tcg/pokemon-cards/", "_blank");
});
document.getElementById("btn-merch").addEventListener("click", () => {
    window.open("https://www.pokemoncenter.com/", "_blank");
});
</script>

<!-- Service Worker for offline caching -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
}
</script>

</body>
</html>
